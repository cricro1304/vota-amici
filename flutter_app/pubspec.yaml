name: vota_amici
description: "Chi è il più...? - Flutter port of the web app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.6

  # Local storage (playerId per room)
  shared_preferences: ^2.2.3

  # Service locator (matches flutter-tester skill setup)
  get_it: ^7.7.0

  # Env config
  flutter_dotenv: ^5.1.0

  # Fonts matching the web app
  google_fonts: ^6.2.1

  # Native share sheet (iOS AirDrop, Android share, Web Share API).
  # Used in the lobby to invite friends by link.
  share_plus: ^10.1.2

  # Live network connectivity status. On web this maps to
  # `navigator.onLine` (which DevTools' Offline toggle flips), so we can show
  # a reconnecting banner even while Riverpod still has cached room data.
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - .env
